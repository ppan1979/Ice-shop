<title>Ice Shop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  sendPasswordResetEmail, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, setDoc, getDoc, getDocs,
  deleteDoc, onSnapshot, query, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg = {
apiKey: "AIzaSyBVp9cEW4maC1oLdJGnduD8Gnpct2FvIaY",
authDomain: "ice-shop-account.firebaseapp.com",
projectId: "ice-shop-account",
storageBucket: "ice-shop-account.firebasestorage.app",
messagingSenderId: "115443037159",
appId: "1:115443037159:web:3748852558c426e7acc342"
};

const fbApp  = initializeApp(cfg);
const fbAuth = getAuth(fbApp);
const fbDb   = getFirestore(fbApp);

// expose to global script tag
window.FB = {
auth: fbAuth, db: fbDb,
createUser: createUserWithEmailAndPassword,
signIn: signInWithEmailAndPassword,
resetPw: sendPasswordResetEmail,
signOut,
col: collection, doc, setDoc, getDoc, getDocs,
deleteDoc, onSnapshot, query, orderBy, limit, startAfter
};

onAuthStateChanged(fbAuth, user => {
if (user) {
window.UID = user.uid;
document.getElementById("loading-wrap").style.display = "none";
document.getElementById("auth-wrap").style.display   = "none";
document.getElementById("app-wrap").style.display    = "flex";
document.getElementById("hdr-email").textContent     = user.email;
window.appBoot();
} else {
window.UID = null;
document.getElementById("loading-wrap").style.display = "none";
document.getElementById("auth-wrap").style.display    = "flex";
document.getElementById("app-wrap").style.display     = "none";
window.stopListeners && window.stopListeners();
}
});
</script>

<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap");

:root {
  --bg:#0b0e18; --sf:#141824; --sf2:#1e2235; --bd:#2a3050;
  --ac:#5ee7c8; --rd:#ff6b6b; --wn:#ffd93d; --pu:#a29bfe; --bl:#74b9ff;
  --tx:#e8eaf0; --tx2:#8b90a7; --tx3:#4e5470;
  --nh:64px; --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--tx);font-size:15px}

/* ── loading ─────────────────────────────── */
#loading-wrap{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── auth ────────────────────────────────── */
#auth-wrap{
  display:none;flex-direction:column;align-items:center;
  min-height:100vh;padding:32px 20px 24px;overflow-y:auto;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(94,231,200,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(162,155,254,.07) 0%,transparent 60%);
}
.a-logo{text-align:center;margin-bottom:28px;flex-shrink:0}
.a-logo .em{font-size:52px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 16px rgba(94,231,200,.45))}
.a-logo h1{font-size:26px;font-weight:900;color:var(--ac);letter-spacing:1px}
.a-logo p{font-size:13px;color:var(--tx3);margin-top:4px}
.a-card{width:100%;max-width:380px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:24px 20px;box-shadow:0 8px 40px rgba(0,0,0,.5);flex-shrink:0}
.a-tabs{display:flex;gap:6px;margin-bottom:20px}
.a-tab{flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;background:var(--sf2);color:var(--tx2);transition:all .15s}
.a-tab.on{background:var(--ac);color:#0b0e18}
.a-form{display:none}
.a-form.on{display:block}
.a-iw{position:relative;margin-bottom:12px}
.a-iw .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.a-iw input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:11px;color:var(--tx);padding:13px 13px 13px 40px;font-family:inherit;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.a-iw input:focus{border-color:var(--ac)}
.a-iw input::placeholder{color:var(--tx3)}
.a-btn{width:100%;padding:14px;border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;background:var(--ac);color:#0b0e18;margin-top:4px;letter-spacing:.4px;transition:all .15s}
.a-btn:active{filter:brightness(.87);transform:scale(.98)}
.a-btn.ld{opacity:.55;pointer-events:none}
.a-lnk{text-align:center;margin-top:14px;font-size:13px;color:var(--tx2)}
.a-lnk a{color:var(--ac);text-decoration:none;cursor:pointer}
.a-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--rd);margin-bottom:12px;display:none}
.a-ok{background:rgba(94,231,200,.1);border:1px solid rgba(94,231,200,.3);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--ac);margin-bottom:12px;display:none}

/* ── app shell ───────────────────────────── */
#app-wrap{display:none;flex-direction:column;height:100%}
.hdr{padding-top:var(--st);background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:9px 15px}
.hdr-mid{flex:1;display:flex;flex-direction:column;align-items:center}
.shop-t{font-size:21px;font-weight:900;color:var(--ac);letter-spacing:1px;cursor:pointer;border-bottom:1.5px dashed transparent;transition:border-color .2s;padding:0 4px;line-height:1.2}
.shop-t:active{border-bottom-color:var(--ac)}
#hdr-email{font-size:10px;color:var(--tx3);margin-top:2px}
.logout-b{background:transparent;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:6px 9px;font-size:11px;font-family:inherit;cursor:pointer;flex-shrink:0}
.logout-b:active{opacity:.65}

/* ── scroll + nav ────────────────────────── */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:13px;padding-bottom:calc(var(--nh) + var(--sb) + 20px)}
.bnav{height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);background:var(--sf);border-top:1px solid var(--bd);display:flex;flex-shrink:0;z-index:50}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:500;transition:color .15s;padding-top:2px;user-select:none}
.ntab.on{color:var(--ac)}
.ntab .ni{font-size:22px;line-height:1}

/* ── pages ───────────────────────────────── */
.pg{display:none}
.pg.on{display:block}

/* ── stat cards ──────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px}
.sl{font-size:11px;color:var(--tx3);margin-bottom:6px}
.sv{font-family:"DM Mono",monospace;font-size:20px;font-weight:500}
.sv.g{color:var(--ac)}
.sv.r{color:var(--rd)}
.ss{font-size:11px;color:var(--tx3);margin-top:3px}
.pcard{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.pcard .pl{font-size:12px;color:var(--tx3);margin-bottom:3px}
.pcard .pv{font-family:"DM Mono",monospace;font-size:27px;font-weight:700}
.pcard .pv.g{color:var(--ac)}
.pcard .pv.r{color:var(--rd)}
.mbadge{font-size:12px;color:var(--tx2);background:var(--sf2);padding:4px 10px;border-radius:20px}

/* ── card ────────────────────────────────── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:13px 15px;margin-bottom:12px}
.ch{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px}

/* ── form ────────────────────────────────── */

label{display:block;font-size:12px;color:var(--tx2);font-weight:500;margin-bottom:5px}

input[type=password],input[type=email],select,textarea{
  width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;

  outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none

  background-repeat:no-repeat;background-position:right 13px center;padding-right:34px
}
select option{background:#141824}
