<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍧 冰店記帳管理系統</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #5ee7c8; --loss: #ff6b6b; --text: #e8eaf0; --text2: #8b90a7; --text3: #5a5f78; --nav-h: 64px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        .header { height: 80px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header-title { font-size: 28px; font-weight: 700; color: var(--accent); cursor: pointer; border: none; background: transparent; text-align: center; width: 100%; outline: none; }
        .app { display: none; flex-direction: column; height: 100%; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
        input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .btn-edit { background: #74b9ff; color: #000; width: 44px; height: 34px; border-radius: 8px; font-size: 12px; }
        .btn-del { background: var(--loss); color: #fff; width: 44px; height: 34px; border-radius: 8px; font-size: 12px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: 11px; }
        .nav-tab.active { color: var(--accent); }
        .exp-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .cat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 4px; text-align: center; font-size: 11px; color: var(--text2); }
        .cat-btn.selected { border-color: var(--accent); background: rgba(94,231,200,0.1); color: var(--accent); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
<div id="auth-overlay"><div class="auth-card"><h1>🍧</h1><h2 id="auth-title" style="color:var(--accent); margin:20px 0;">系統登入</h2><input type="email" id="login-email" placeholder="Email" style="margin-bottom:10px;"><input type="password" id="login-pw" placeholder="密碼" style="margin-bottom:10px;"><button class="btn btn-primary" onclick="handleAuth('login')">登入</button><button class="btn btn-outline" onclick="handleAuth('signup')">註冊</button><button class="btn btn-outline" onclick="handleAuth('reset')" style="font-size:12px;">忘記密碼</button><p id="auth-error" style="color:var(--loss); font-size:12px; margin-top:10px;"></p></div></div>
<div class="app" id="main-app">
    <div class="header"><input type="text" class="header-title" id="app-title" onchange="updateTitle()"></div>
    <div class="scroll-area">
        <div id="page-home" class="page active"><div class="card" style="text-align:center;"><div style="font-size:12px;color:var(--text3)">本月損益</div><div id="h-profit" style="font-size:32px;font-weight:700;">$0</div><div id="h-margin" style="color:var(--accent)">毛利率 0%</div></div></div>
        <div id="page-entry" class="page">
            <div class="card"><h3>📟 收入</h3><input type="date" id="rev-date"><input type="number" id="rev-amount" placeholder="金額"><button class="btn btn-primary" onclick="saveData('revenue')">儲存</button></div>
            <div class="card"><h3>💸 支出</h3><input type="date" id="exp-date"><div class="cat-grid" id="cat-grid">
                <button class="cat-btn selected" data-cat="food">🥭 食材原料</button><button class="cat-btn" data-cat="staff">👥 人事/孝親</button><button class="cat-btn" data-cat="utility">💡 水電/網路</button><button class="cat-btn" data-cat="rent">🛠️ 設備維修</button><button class="cat-btn" data-cat="supply">📦 耗材包材</button><button class="cat-btn" data-cat="other">📌 其他雜費</button>
            </div><input type="text" id="exp-name" placeholder="項目明細"><input type="number" id="exp-amount" placeholder="金額"><button class="btn btn-primary" onclick="saveData('expense')">儲存</button></div>
        </div>
        <div id="page-list" class="page"><select id="list-month" onchange="renderList()" style="margin-bottom:10px;"></select><div id="records-container"></div></div>
        <div id="page-more" class="page"><div class="card"><h3>📥 匯出 CSV</h3><input type="date" id="csv-start"><input type="date" id="csv-end"><button class="btn btn-primary" onclick="exportCSV()">下載</button></div><button class="btn btn-outline" onclick="firebase.auth().signOut()">登出</button></div>
    </div>
    <nav class="bottom-nav"><div class="nav-tab active" onclick="showPage('home')">📊<span>總覽</span></div><div class="nav-tab" onclick="showPage('entry')">✏️<span>記帳</span></div><div class="nav-tab" onclick="showPage('list')">📋<span>明細</span></div><div class="nav-tab" onclick="showPage('more')">⚙️<span>設定</span></div></nav>
</div>
<script>
const firebaseConfig = { apiKey: "AIzaSyBVp9cEW4maC1oLdJGnduD8Gnpct2FvIaY", authDomain: "ice-shop-account.firebaseapp.com", projectId: "ice-shop-account", storageBucket: "ice-shop-account.firebasestorage.app", messagingSenderId: "115443037159", appId: "1:115443037159:web:3748852558c426e7acc342" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.database();
let userRef = null; let currentData = { title: "🍧 冰店記帳", revenues: [], expenses: [] };
const catMap = { food: "食材原料", staff: "人事支出/孝親費", utility: "水電費/網路電話費", rent: "設備採買或維修", supply: "耗材包材", other: "其他雜費" };

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        userRef = db.ref('users/' + user.uid);
        userRef.on('value', snap => {
            if(snap.val()) currentData = snap.val();
            document.getElementById('app-title').value = currentData.title || "🍧 冰店記帳";
            updateUI();
        });
    } else { document.getElementById('auth-overlay').style.display = 'flex'; }
});

function handleAuth(t) {
    const e = document.getElementById('login-email').value, p = document.getElementById('login-pw').value;
    if(t==='login') auth.signInWithEmailAndPassword(e,p).catch(err=>alert(err.message));
    else if(t==='signup') auth.createUserWithEmailAndPassword(e,p).then(()=>alert("註冊成功")).catch(err=>alert(err.message));
    else auth.sendPasswordResetEmail(e).then(()=>alert("郵件已寄出"));
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id === 'list') renderList();
}

function saveData(type) {
    const date = document.getElementById(type==='revenue'?'rev-date':'exp-date').value;
    const amount = parseFloat(document.getElementById(type==='revenue'?'rev-amount':'exp-amount').value);
    if(!date || isNaN(amount)) return alert("請填寫正確");
    if(type==='revenue') {
        const idx = (currentData.revenues||[]).findIndex(r=>r.date===date);
        if(idx>-1) currentData.revenues[idx].amount = amount;
        else (currentData.revenues = currentData.revenues||[]).push({date, amount});
    } else {
        const name = document.getElementById('exp-name').value, cat = document.querySelector('.cat-btn.selected').dataset.cat;
        (currentData.expenses = currentData.expenses||[]).push({id:Date.now(), date, amount, name, category:cat});
    }
    userRef.set(currentData); alert("儲存成功");
}

function renderList() {
    const m = document.getElementById('list-month').value, cont = document.getElementById('records-container');
    const items = (currentData.expenses||[]).filter(e=>e.date.startsWith(m)).sort((a,b)=>b.date.localeCompare(a.date));
    cont.innerHTML = items.map(e => `
        <div class="exp-item">
            <div style="flex:1"><b>${e.name}</b><br><small>${e.date} | ${catMap[e.category]}</small></div>
            <div style="text-align:right"><span style="color:var(--loss)">-$${e.amount}</span><br>
            <button class="btn-edit" onclick="editItem(${e.id})">改</button><button class="btn-del" onclick="delItem(${e.id})">刪</button></div>
        </div>`).join('');
}

function editItem(id) {
    if(prompt("請輸入密碼")!=="9527") return alert("錯誤");
    const item = currentData.expenses.find(e=>e.id===id);
    const val = prompt("新金額", item.amount);
    if(val) { item.amount = parseFloat(val); userRef.set(currentData); }
}

function delItem(id) { if(confirm("確定刪除?")) { currentData.expenses = currentData.expenses.filter(e=>e.id!==id); userRef.set(currentData); } }

function exportCSV() {
    const s = document.getElementById('csv-start').value, e = document.getElementById('csv-end').value;
    let rows = [["日期","項目","分類","金額"]];
    (currentData.revenues||[]).filter(r=>r.date>=s&&r.date<=e).forEach(r=>rows.push([r.date,"營業額","收入",r.amount]));
    (currentData.expenses||[]).filter(x=>x.date>=s&&x.date<=e).forEach(x=>rows.push([x.date,x.name,catMap[x.category],x.amount]));
    const blob = new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")], {type:'text/csv'});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`export.csv`; a.click();
}

function updateUI() {
    const m = new Date().toISOString().slice(0,7);
    const tr = (currentData.revenues||[]).filter(r=>r.date.startsWith(m)).reduce((a,b)=>a+b.amount,0);
    const tx = (currentData.expenses||[]).filter(e=>e.date.startsWith(m)).reduce((a,b)=>a+b.amount,0);
    document.getElementById('h-profit').textContent = `$${tr-tx}`;
    document.getElementById('h-margin').textContent = `毛利率 ${tr?(((tr-tx)/tr)*100).toFixed(1):0}%`;
    const months = [...new Set([...(currentData.revenues||[]).map(r=>r.date.slice(0,7)),...(currentData.expenses||[]).map(e=>e.date.slice(0,7))])].sort().reverse();
    document.getElementById('list-month').innerHTML = (months.length?months:[m]).map(x=>`<option value="${x}">${x}</option>`).join('');
}
function updateTitle(){ currentData.title = document.getElementById('app-title').value; userRef.set(currentData); }
document.querySelectorAll('.cat-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')});
document.getElementById('rev-date').value = document.getElementById('exp-date').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
