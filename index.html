<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍧 冰店進階記帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVp9cEW4maC1oLdJGnduD8Gnpct2FvIaY",
  authDomain: "ice-shop-account.firebaseapp.com",
  projectId: "ice-shop-account",
  storageBucket: "ice-shop-account.firebasestorage.app",
  messagingSenderId: "115443037159",
  appId: "1:115443037159:web:3748852558c426e7acc342"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._auth = auth; window._db = db;
window._fb = { signInWithEmailAndPassword, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, orderBy };

onAuthStateChanged(auth, user => {
  if (user) {
    window._uid = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    window.appInit();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});
</script>

<style>
:root {
  --bg: #0b0e18; --surface: #141824; --surface2: #1e2235;
  --border: #2a3050; --accent: #5ee7c8; --loss: #ff6b6b;
  --text: #e8eaf0; --text2: #8b90a7; --text3: #4e5470;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout */
#main-app { display: none; flex-direction: column; height: 100%; }
.scroll-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
.header { background: var(--surface); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

/* UI Components */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
.form-group { margin-bottom: 10px; }
label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 16px; }

.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
.btn-primary { background: var(--accent); color: #000; }
.btn-del { background: transparent; color: var(--loss); border: 1px solid var(--loss); margin-top: 5px; }

/* Tabs */
.nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; border-top: 1px solid var(--border); }
.nav-item { flex: 1; text-align: center; padding: 12px; font-size: 12px; color: var(--text3); }
.nav-item.active { color: var(--accent); }

/* List */
.item-row { border-bottom: 1px solid var(--border); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
.item-info { flex: 1; }
.item-name { font-weight: bold; }
.item-sub { font-size: 11px; color: var(--text3); }
.item-price { font-family: monospace; color: var(--loss); }
.edit-btn { background: var(--surface2); color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-left: 10px; }

/* Modal */
.modal { position: fixed; inset:0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
.modal.open { display: flex; }
.modal-content { background: var(--surface); border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; }
</style>
</head>
<body>

<div id="auth-screen" style="display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
  <h1 style="color:var(--accent); margin-bottom:20px;">🍧 冰店記帳登入</h1>
  <div class="card" style="width:100%; max-width:320px;">
    <input type="email" id="auth-email" placeholder="Email" style="margin-bottom:10px;">
    <input type="password" id="auth-pw" placeholder="Password">
    <button class="btn btn-primary" style="margin-top:15px;" onclick="doLogin()">登入</button>
  </div>
</div>

<div id="main-app">
  <div class="header">
    <div id="display-shop-name" style="font-weight:bold; color:var(--accent)">🍧 冰店記帳</div>
    <button onclick="window._fb.signOut(window._auth)" style="background:none; border:1px solid var(--text3); color:var(--text3); padding:4px 8px; border-radius:4px;">登出</button>
  </div>

  <div class="scroll-area">
    <div id="p-home" class="page">
      <div class="card">
        <div style="font-size:12px; color:var(--text3)">本月盈虧</div>
        <div id="h-profit" style="font-size:32px; font-weight:bold;">$0</div>
      </div>
      <div id="recent-list"></div>
    </div>

    <div id="p-entry" class="page" style="display:none">
      <div class="card">
        <label>日期</label>
        <input type="date" id="in-date">
        <label style="margin-top:10px">分類</label>
        <select id="in-cat">
          <option value="food">🥭 食材原料</option>
          <option value="staff">👥 人事/孝親費</option>
          <option value="utility">💡 水電網路</option>
          <option value="rent">🔧 設備維修</option>
          <option value="supply">📦 耗材包材</option>
          <option value="other">📌 其他雜費</option>
        </select>
        <label style="margin-top:10px">項目名稱</label>
        <input type="text" id="in-name" placeholder="例如：芒果補貨">
        <label style="margin-top:10px">明細內容</label>
        <input type="text" id="in-detail" placeholder="例如：愛文芒果 20 斤">
        <label style="margin-top:10px">金額</label>
        <input type="number" id="in-amount" inputmode="numeric">
        <button class="btn btn-primary" style="margin-top:15px" onclick="saveData()">儲存支出</button>
      </div>
    </div>

    <div id="p-list" class="page" style="display:none">
      <div id="list-container"></div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" id="n-home" onclick="showPage('home')">總覽</div>
    <div class="nav-item" id="n-entry" onclick="showPage('entry')">記帳</div>
    <div class="nav-item" id="n-list" onclick="showPage('list')">明細</div>
  </div>
</div>

<div id="pwd-modal" class="modal">
  <div class="modal-content">
    <h3>🔐 權限驗證</h3>
    <p style="font-size:13px; color:var(--text2); margin: 10px 0;">進行修改或刪除請輸入管理密碼</p>
    <input type="password" id="admin-pwd" placeholder="請輸入密碼" style="text-align:center; font-size:20px; letter-spacing:4px;">
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button class="btn" onclick="closeModal('pwd-modal')">取消</button>
      <button class="btn btn-primary" onclick="verifyPwd()">確認</button>
    </div>
  </div>
</div>

<div id="edit-modal" class="modal">
  <div class="modal-content">
    <h3>✏️ 編輯支出</h3>
    <input type="hidden" id="edit-id">
    <label>項目名稱</label><input type="text" id="ed-name">
    <label>金額</label><input type="number" id="ed-amount">
    <button class="btn btn-primary" style="margin-top:15px" onclick="confirmEdit()">儲存更改</button>
    <button class="btn btn-del" onclick="confirmDelete()">刪除此筆記錄</button>
    <button class="btn" style="margin-top:10px" onclick="closeModal('edit-modal')">關閉</button>
  </div>
</div>

<script>
let _data = [];
let _pendingAction = null; 

async function doLogin() {
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-pw').value;
  try { await window._fb.signInWithEmailAndPassword(window._auth, e, p); }
  catch(err) { alert('登入失敗: ' + err.message); }
}

window.appInit = async function() {
  document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
  await refreshData();
  showPage('home');
}

async function refreshData() {
  const q = window._fb.query(window._fb.collection(window._db, "users", window._uid, "expenses"), window._fb.orderBy("date", "desc"));
  const snap = await window._fb.getDocs(q);
  _data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAll();
}

function renderAll() {
  // 渲染總覽
  const total = _data.reduce((s, v) => s + Number(v.amount), 0);
  document.getElementById('h-profit').textContent = `$${total.toLocaleString()}`;

  // 渲染明細頁
  const container = document.getElementById('list-container');
  container.innerHTML = _data.length ? '' : '<p style="text-align:center;color:var(--text3)">尚無資料</p>';
  _data.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-sub">${item.date} | ${item.detail || '無說明'}</div>
      </div>
      <div style="display:flex; align-items:center;">
        <div class="item-price">-$${Number(item.amount).toLocaleString()}</div>
        <button class="edit-btn" onclick="askEdit('${item.id}')">編輯</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function saveData() {
  const payload = {
    date: document.getElementById('in-date').value,
    category: document.getElementById('in-cat').value,
    name: document.getElementById('in-name').value,
    detail: document.getElementById('in-detail').value,
    amount: Number(document.getElementById('in-amount').value),
    ts: Date.now()
  };
  if(!payload.name || !payload.amount) return alert('請填寫完整');
  
  await window._fb.setDoc(window._fb.doc(window._fb.collection(window._db, "users", window._uid, "expenses")), payload);
  alert('儲存成功');
  await refreshData();
  showPage('list');
}

// 權限與編輯邏輯
function askEdit(id) {
  _pendingAction = id;
  document.getElementById('admin-pwd').value = '';
  openModal('pwd-modal');
}

function verifyPwd() {
  const pwd = document.getElementById('admin-pwd').value;
  if(pwd === '9527') {
    closeModal('pwd-modal');
    openEditWindow(_pendingAction);
  } else {
    alert('密碼錯誤！');
  }
}

function openEditWindow(id) {
  const item = _data.find(x => x.id === id);
  document.getElementById('edit-id').value = id;
  document.getElementById('ed-name').value = item.name;
  document.getElementById('ed-amount').value = item.amount;
  openModal('edit-modal');
}

async function confirmEdit() {
  const id = document.getElementById('edit-id').value;
  const item = _data.find(x => x.id === id);
  const newData = {
    ...item,
    name: document.getElementById('ed-name').value,
    amount: Number(document.getElementById('ed-amount').value)
  };
  await window._fb.setDoc(window._fb.doc(window._db, "users", window._uid, "expenses", id), newData);
  closeModal('edit-modal');
  refreshData();
}

async function confirmDelete() {
  if(!confirm('確定要刪除嗎？')) return;
  const id = document.getElementById('edit-id').value;
  await window._fb.deleteDoc(window._fb.doc(window._db, "users", window._uid, "expenses", id));
  closeModal('edit-modal');
  refreshData();
}

// 通用 UI
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('p-' + p).style.display = 'block';
  document.getElementById('n-' + p).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
