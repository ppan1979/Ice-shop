<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍧 冰店記帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVp9cEW4maC1oLdJGnduD8Gnpct2FvIaY",
  authDomain: "ice-shop-account.firebaseapp.com",
  projectId: "ice-shop-account",
  storageBucket: "ice-shop-account.firebasestorage.app",
  messagingSenderId: "115443037159",
  appId: "1:115443037159:web:3748852558c426e7acc342"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._auth = auth;
window._db = db;
window._fbFns = { signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, orderBy };

onAuthStateChanged(auth, user => {
  if (user) {
    window._uid = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    window.appInit();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});
</script>

<style>
/* 這裡嚴格保留你原本的所有 CSS 樣式，不做任何縮減 */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg: #0b0e18; --surface: #141824; --surface2: #1e2235; --border: #2a3050;
  --accent: #5ee7c8; --loss: #ff6b6b; --warn: #ffd93d; --purple: #a29bfe;
  --blue: #74b9ff; --text: #e8eaf0; --text2: #8b90a7; --text3: #4e5470;
  --nav-h: 64px; --safe-bottom: env(safe-area-inset-bottom, 0px); --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

#auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 20px; background: var(--bg); }
.auth-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; }
.auth-input-wrap { margin-bottom: 14px; }
.auth-input-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 13px 14px; font-size: 16px; outline: none; }
.auth-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #0b0e18; font-weight: 700; cursor: pointer; }

#main-app { display: none; flex-direction: column; height: 100%; }
.header { padding-top: var(--safe-top); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
.shop-title { font-size: 20px; font-weight: 900; color: var(--accent); }

.scroll-area { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 20px); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.card-head { font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; }

.form-group { margin-bottom: 12px; }
label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 16px; outline: none; }

.btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--accent); color: #0b0e18; }

.exp-item { padding: 12px 0; border-bottom: 1px solid rgba(42,48,80,.5); display: flex; justify-content: space-between; align-items: center; }
.exp-info { flex: 1; }
.exp-name { font-size: 15px; font-weight: 500; }
.exp-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.exp-amount { color: var(--loss); font-family: 'DM Mono', monospace; font-weight: 500; }
.act-edit { margin-left: 10px; padding: 4px 8px; font-size: 11px; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; background: transparent; cursor: pointer; }

.bottom-nav { height: calc(var(--nav-h) + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; }
.nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text3); cursor: pointer; }
.nav-tab.active { color: var(--accent); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--surface); border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1 style="color:var(--accent); text-align:center; margin-bottom:20px;">🍧 冰店記帳登入</h1>
    <div class="auth-input-wrap"><input type="email" id="login-email" placeholder="Email"></div>
    <div class="auth-input-wrap"><input type="password" id="login-pw" placeholder="Password"></div>
    <button class="auth-btn" onclick="doLogin()">登入</button>
  </div>
</div>

<div id="main-app">
  <div class="header"><div class="header-inner"><div class="shop-title">🍧 冰店記帳</div><button onclick="window._fbFns.signOut(window._auth)" style="background:none; border:1px solid var(--border); color:var(--text3); padding:4px 8px; border-radius:6px; font-size:11px;">登出</button></div></div>

  <div class="scroll-area">
    <div id="page-home" class="page active">
      <div class="card"><div class="card-head">本月支出總計</div><div id="m-exp" style="font-size:32px; font-weight:900; color:var(--loss)">$0</div></div>
      <div class="card"><div class="card-head">最近支出</div><div id="recent-list"></div></div>
    </div>

    <div id="page-entry" class="page" style="display:none">
      <div class="card">
        <div class="card-head">💸 新增支出</div>
        <div class="form-group"><label>日期</label><input type="date" id="exp-date"></div>
        <div class="form-group"><label>項目名稱</label><input type="text" id="exp-name" placeholder="例如：芒果補貨"></div>
        <div class="form-group"><label>明細說明</label><input type="text" id="exp-detail-input" placeholder="例如：愛文芒果 30 斤"></div>
        <div class="form-group"><label>金額</label><input type="number" id="exp-amount" inputmode="numeric"></div>
        <button class="btn btn-primary" onclick="saveExpense()">儲存支出</button>
      </div>
    </div>

    <div id="page-records" class="page" style="display:none">
      <div class="card"><div class="card-head">所有明細</div><div id="records-list"></div></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-tab active" onclick="showPage('home')">📊 總覽</div>
    <div class="nav-tab" onclick="showPage('entry')">✏️ 記帳</div>
    <div class="nav-tab" onclick="showPage('records')">📋 明細</div>
  </nav>
</div>

<div class="modal-overlay" id="pwd-modal">
  <div class="modal-sheet">
    <h3 style="margin-bottom:15px">🔐 權限驗證</h3>
    <input type="password" id="admin-pwd" placeholder="請輸入密碼" style="text-align:center; font-size:20px; letter-spacing:4px;">
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button class="btn" onclick="closeModal('pwd-modal')">取消</button>
      <button class="btn btn-primary" onclick="verifyPwd()">確認</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-sheet">
    <h3 style="margin-bottom:15px">✏️ 修改支出</h3>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>名稱</label><input type="text" id="ed-name"></div>
    <div class="form-group"><label>金額</label><input type="number" id="ed-amount"></div>
    <button class="btn btn-primary" onclick="saveEdit()">儲存修改</button>
    <button class="btn" style="margin-top:10px; color:var(--loss)" onclick="deleteItem()">刪除</button>
    <button class="btn" style="margin-top:10px" onclick="closeModal('edit-modal')">取消</button>
  </div>
</div>

<script>
let _cache = [];
let _pendingId = null;

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-pw').value;
  try { await window._fbFns.signInWithEmailAndPassword(window._auth, email, pw); }
  catch(e) { alert('登入失敗'); }
}

window.appInit = async function() {
  document.getElementById('exp-date').value = new Date().toISOString().slice(0,10);
  await refreshData();
}

async function refreshData() {
  const q = window._fbFns.query(window._fbFns.collection(window._db, "users", window._uid, "expenses"), window._fbFns.orderBy("date", "desc"));
  const snap = await window._fbFns.getDocs(q);
  _cache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderUI();
}

function renderUI() {
  const total = _cache.reduce((s, v) => s + Number(v.amount), 0);
  document.getElementById('m-exp').textContent = `$${total.toLocaleString()}`;
  
  const listHtml = _cache.map(item => `
    <div class="exp-item">
      <div class="exp-info">
        <div class="exp-name">${item.name}</div>
        <div class="exp-meta">${item.date} | ${item.detail || ''}</div>
      </div>
      <div class="exp-amount">-$${Number(item.amount).toLocaleString()}</div>
      <button class="act-edit" onclick="checkAuth('${item.id}')">編輯</button>
    </div>
  `).join('');
  
  document.getElementById('recent-list').innerHTML = listHtml;
  document.getElementById('records-list').innerHTML = listHtml;
}

async function saveExpense() {
  const data = {
    date: document.getElementById('exp-date').value,
    name: document.getElementById('exp-name').value,
    detail: document.getElementById('exp-detail-input').value,
    amount: Number(document.getElementById('exp-amount').value)
  };
  if(!data.name || !data.amount) return alert('請填寫完整');
  await window._fbFns.setDoc(window._fbFns.doc(window._fbFns.collection(window._db, "users", window._uid, "expenses")), data);
  alert('已儲存');
  await refreshData();
  showPage('home');
}

function checkAuth(id) {
  _pendingId = id;
  document.getElementById('admin-pwd').value = '';
  document.getElementById('pwd-modal').classList.add('open');
}

function verifyPwd() {
  if(document.getElementById('admin-pwd').value === '9527') {
    closeModal('pwd-modal');
    const item = _cache.find(x => x.id === _pendingId);
    document.getElementById('edit-id').value = _pendingId;
    document.getElementById('ed-name').value = item.name;
    document.getElementById('ed-amount').value = item.amount;
    document.getElementById('edit-modal').classList.add('open');
  } else { alert('密碼錯誤'); }
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const item = _cache.find(x => x.id === id);
  const updated = { ...item, name: document.getElementById('ed-name').value, amount: Number(document.getElementById('ed-amount').value) };
  await window._fbFns.setDoc(window._fbFns.doc(window._db, "users", window._uid, "expenses", id), updated);
  closeModal('edit-modal');
  refreshData();
}

async function deleteItem() {
  if(!confirm('確定刪除？')) return;
  await window._fbFns.deleteDoc(window._fbFns.doc(window._db, "users", window._uid, "expenses", document.getElementById('edit-id').value));
  closeModal('edit-modal');
  refreshData();
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
  document.getElementById('page-' + p).style.display = 'block';
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
